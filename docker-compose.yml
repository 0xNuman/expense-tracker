name: expensetracker

services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: et-postgres
    environment:
      POSTGRES_DB: expensetracker
      POSTGRES_USER: et
      POSTGRES_PASSWORD: et
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U et -d expensetracker"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  smtp:
    image: docker.io/axllent/mailpit:latest
    container_name: et-mailpit
    ports:
      - "1025:1025"    # SMTP from the API
      - "8025:8025"    # Web UI for viewing captured mail
    restart: unless-stopped

volumes:
  postgres_data: